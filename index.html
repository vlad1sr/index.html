<!DOCTYPE html><html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>...</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;1,700;1,800&family=Playfair+Display:ital,wght@0,600;1,600;1,700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
}

body {
  background: linear-gradient(135deg, #0a0a15 0%, #1a0a2e 100%);
  font-family: 'Inter', sans-serif;
  color: white;
}

canvas#bg {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
}

.stage {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 10;
  pointer-events: none;
}

.center-stack {
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
  text-align: center;
  pointer-events: auto;
}

.soft-glow {
  position: absolute;
  width: 300px;
  height: 300px;
  background: radial-gradient(circle, rgba(255, 86, 170, 0.3) 0%, transparent 70%);
  border-radius: 50%;
  filter: blur(40px);
  z-index: -1;
}

.text-wrap {
  font-size: 2rem;
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  letter-spacing: 1px;
  min-height: 100px;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.word {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeInUp 0.6s ease-out forwards;
}

@keyframes fadeInUp {
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.word.show {
  animation: fadeInUp 0.6s ease-out forwards;
}

.heart-shell {
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  pointer-events: auto;
}

.heart {
  width: 120px;
  height: 120px;
  position: relative;
  transform-origin: center;
  animation: heartBeat 1.2s ease-in-out infinite;
}

.heart::before,
.heart::after {
  content: '';
  position: absolute;
  top: 0;
  width: 120px;
  height: 190px;
  background: #ff5aaa;
  border-radius: 120px 120px 0 0;
}

.heart::before {
  left: 120px;
  transform: rotate(-45deg);
  transform-origin: 0 190px;
}

.heart::after {
  left: 0;
  transform: rotate(45deg);
  transform-origin: 120px 190px;
}

@keyframes heartBeat {
  0%, 100% {
    transform: scale(1);
  }
  10%, 30% {
    transform: scale(0.9);
  }
  20%, 40%, 60%, 80% {
    transform: scale(1.1);
  }
  50% {
    transform: scale(1.15);
  }
}

.heart-shell:hover .heart {
  filter: drop-shadow(0 0 20px #ff5aaa);
}

.music-btn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #ff5aaa 0%, #ff86c4 100%);
  color: white;
  border: none;
  border-radius: 30px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s ease;
  z-index: 20;
  box-shadow: 0 4px 15px rgba(255, 90, 170, 0.4);
  font-family: 'Inter', sans-serif;
}

.music-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(255, 90, 170, 0.6);
}

.music-btn:active {
  transform: translateY(0);
}

.tiny-note {
  position: fixed;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  color: rgba(255, 206, 230, 0.6);
  font-family: 'Inter', sans-serif;
  text-align: center;
  z-index: 15;
}

@media (max-width: 768px) {
  .text-wrap {
    font-size: 1.5rem;
  }
  
  .heart {
    width: 80px;
    height: 80px;
  }
  
  .heart::before,
  .heart::after {
    width: 80px;
    height: 127px;
  }
  
  .music-btn {
    bottom: 20px;
    right: 20px;
    padding: 10px 20px;
    font-size: 12px;
  }
}
</style>
</head>

<body>
<canvas id="bg"></canvas>
<div class="particles" id="particles"></div>

<div class="stage">
  <div class="center-stack" id="centerStack">
    <div class="soft-glow"></div>
    <div class="text-wrap" id="textWrap"></div>
    <div class="envelope-stage" id="envelopeStage" style="opacity:0; transform: translateY(14px); transition: opacity 0.8s ease, transform 0.8s ease;"></div>
  </div>
</div>

<button class="music-btn" id="musicBtn">♫ Включить музыку</button>
<div class="tiny-note">Для музыки добавь файл music.mp3 рядом с index.html</div>

<audio id="music" loop preload="auto">
<source src="music.mp3" type="audio/mpeg" />
</audio>

<script>
const prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');
const particles = document.getElementById('particles');
const textWrap = document.getElementById('textWrap');
const envelopeStage = document.getElementById('envelopeStage');
const music = document.getElementById('music');
const musicBtn = document.getElementById('musicBtn');

let W = 0, H = 0, dpr = 1;
const streaks = [];
const stars = [];

function resize() {
dpr = Math.min(window.devicePixelRatio || 1, 2);
W = window.innerWidth;
H = window.innerHeight;

canvas.width = Math.floor(W * dpr);
canvas.height = Math.floor(H * dpr);
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';

ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

if (!stars.length) {
for (let i = 0; i < 120; i++) {
stars.push({
x: Math.random() * W,
y: Math.random() * H,
r: Math.random() * 1.25 + 0.2,
a: Math.random() * 0.55 + 0.15,
tw: Math.random() * 0.02 + 0.005
});
}
}
}

window.addEventListener('resize', resize, { passive: true });
resize();

function rgba(r,g,b,a){
return `rgba(${r},${g},${b},${a})`;
}

function spawnStreak() {
if (streaks.length > 70) return;
streaks.push({
x: Math.random() * W,
y: -40 - Math.random() * H * 0.2,
vx: -0.25 - Math.random() * 0.12,
vy: 3.8 + Math.random() * 3.4,
len: 30 + Math.random() * 40,
w: 1 + Math.random() * 1.8,
life: 1,
decay: 0.008 + Math.random() * 0.008
});
}

function drawBackground() {
ctx.clearRect(0, 0, W, H);
ctx.fillStyle = 'rgba(2, 2, 4, 0.16)';
ctx.fillRect(0, 0, W, H);

const grad = ctx.createRadialGradient(W * 0.5, H * 0.38, 20, W * 0.5, H * 0.38, Math.max(W, H) * 0.6);
grad.addColorStop(0, 'rgba(255, 134, 196, 0.06)');
grad.addColorStop(0.55, 'rgba(255, 86, 170, 0.025)');
grad.addColorStop(1, 'rgba(255, 86, 170, 0)');
ctx.fillStyle = grad;
ctx.fillRect(0, 0, W, H);

for (const s of stars) {
s.x += 0.01;
s.a += Math.sin(Date.now() * s.tw + s.x) * 0.002;
if (s.x > W + 4) s.x = -4;

ctx.beginPath();
ctx.fillStyle = rgba(255, 206, 230, Math.max(0.12, Math.min(0.75, s.a)));
ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
ctx.fill();
}

if (!prefersReducedMotion) {
if (Math.random() < 0.18) spawnStreak();
}

for (let i = streaks.length - 1; i >= 0; i--) {
const st = streaks[i];
st.x += st.vx;
st.y += st.vy;
st.life -= st.decay;

const alpha = Math.max(0, st.life);

const x2 = st.x - st.vx * st.len;
const y2 = st.y - st.vy * st.len;

const g = ctx.createLinearGradient(st.x, st.y, x2, y2);
g.addColorStop(0, rgba(255, 194, 227, 0.85 * alpha));
g.addColorStop(1, rgba(255, 124, 186, 0));

ctx.strokeStyle = g;
ctx.lineWidth = st.w;
ctx.lineCap = 'round';

ctx.beginPath();
ctx.moveTo(st.x, st.y);
ctx.lineTo(x2, y2);
ctx.stroke();

if (st.life <= 0 || st.y > H + 80 || st.x < -120) {
streaks.splice(i, 1);
}
}

requestAnimationFrame(drawBackground);
}

drawBackground();

const scenes = [
'1..',
'2..',
'3..',
'поздравляю тебя, моя любовь,',
'с 7 месяцами отношений'
];

function delay(ms) {
return new Promise(resolve => setTimeout(resolve, ms));
}

async function showTextSequence() {
for (const line of scenes) {
textWrap.innerHTML = '';

const el = document.createElement('div');
el.className = 'word';
el.textContent = line;

textWrap.appendChild(el);

requestAnimationFrame(() => el.classList.add('show'));

await delay(line.includes('поздравляю') ? 2400 : 1400);
}

await delay(250);
showHeart();
}

function showHeart() {
textWrap.innerHTML = '';

const holder = document.createElement('div');
holder.style.display = 'flex';
holder.style.justifyContent = 'center';
holder.style.alignItems = 'center';
holder.style.gap = '12px';
holder.style.pointerEvents = 'auto';

const shell = document.createElement('div');
shell.className = 'heart-shell';
shell.innerHTML = '<div class="heart"></div>';

shell.addEventListener('pointerdown', () => {
burstHeart(shell);
}, { once: true });

shell.addEventListener('click', () => {
burstHeart(shell);
}, { once: true });

holder.appendChild(shell);
textWrap.appendChild(holder);

requestAnimationFrame(() => {
holder.style.opacity = '1';
});
}

function burstHeart(shell) {
const heart = shell.querySelector('.heart');
if (heart) {
heart.style.animation = 'none';
heart.style.transform = 'scale(0) rotate(45deg)';
heart.style.opacity = '0';
}
}

// запуск
showTextSequence();

async function tryPlayMusic() {
try {
await music.play();
musicBtn.textContent = '♫ Музыка играет';
} catch (_) {}
}

// Универсальные обработчики событий для всех устройств
musicBtn.addEventListener('pointerdown', tryPlayMusic);
musicBtn.addEventListener('click', tryPlayMusic);
musicBtn.addEventListener('touchstart', tryPlayMusic);
</script>
</body>
</html>
