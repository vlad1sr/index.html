<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>...</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,700;0,800&family=Playfair+Display:ital,wght@0,600;1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #050507;
        --pink: #ff8acb;
        --pink-2: #ffb3df;
        --rose: #ffd1ea;
        --paper: #f2d9b4;
        --paper-dark: #d7b484;
        --ink: #2f2118;
        --shadow: rgba(0, 0, 0, 0.38);
        --ease-out: cubic-bezier(0.18, 0.88, 0.22, 1);
        --ease-soft: cubic-bezier(0.2, 0.8, 0.2, 1);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: radial-gradient(
          1200px 800px at 50% 40%,
          #120812 0%,
          #070709 45%,
          #020203 100%
        );
        font-family: Inter, -apple-system, BlinkMacSystemFont, "San Francisco",
          "Segoe UI", system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
        user-select: none;
        -webkit-user-select: none;
        overscroll-behavior: none;
        touch-action: none;
      }

      canvas#bg {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100vh;
      }

      .stage {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
      }

      .center-stack {
        position: relative;
        width: min(92vw, 620px);
        height: min(72vh, 640px);
        display: grid;
        place-items: center;
      }

      .text-wrap {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        text-align: center;
        pointer-events: auto;
      }

      .word {
        opacity: 0;
        transform: translateY(18px) scale(0.985);
        transition: opacity 1.35s var(--ease-soft),
          transform 1.35s var(--ease-soft);
        color: #fff7fb;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "San Francisco",
          system-ui, sans-serif;
        font-style: italic;
        font-weight: 800;
        letter-spacing: 0.01em;
        line-height: 1.3;
        font-size: clamp(28px, 4.4vw, 52px);
        text-shadow: -1px -1px 0 rgba(0, 0, 0, 0.95),
          1px -1px 0 rgba(0, 0, 0, 0.95), -1px 1px 0 rgba(0, 0, 0, 0.95),
          1px 1px 0 rgba(0, 0, 0, 0.95), 0 0 16px rgba(0, 0, 0, 0.72),
          0 0 28px rgba(0, 0, 0, 0.35);
        filter: drop-shadow(0 0 1px rgba(0, 0, 0, 0.8));
        max-width: 88vw;
        pointer-events: none;
      }

      .word.show {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      .heart-shell {
        position: relative;
        width: min(24vw, 118px);
        aspect-ratio: 1;
        pointer-events: auto;
        cursor: pointer;
        touch-action: manipulation;
        filter: drop-shadow(0 18px 26px rgba(255, 112, 175, 0.16));
        transform: translateZ(0);
        display: grid;
        place-items: center;
        outline: none;
        z-index: 20;
      }

      .heart-shell:focus-visible {
        outline: 2px solid rgba(255, 255, 255, 0.45);
        outline-offset: 6px;
        border-radius: 22px;
      }

      .heart {
        position: absolute;
        inset: 18% 18% 18% 18%;
        transform: rotate(45deg);
        background: linear-gradient(
          145deg,
          #ff7bbd 0%,
          #ffa8d4 44%,
          #ff7fbe 100%
        );
        border-radius: 18% 18% 10% 10%;
        box-shadow: inset -10px -12px 18px rgba(167, 18, 92, 0.14),
          inset 8px 10px 18px rgba(255, 255, 255, 0.2);
        transition: transform 0.85s var(--ease-soft), opacity 0.45s ease;
        animation: beat 1.7s var(--ease-soft) infinite;
        will-change: transform, opacity;
        pointer-events: auto;
      }

      .heart::before,
      .heart::after {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background: inherit;
        box-shadow: inherit;
      }

      .heart::before {
        top: -50%;
        left: 0;
      }

      .heart::after {
        left: -50%;
        top: 0;
        transform: translateZ(0);
      }

      @keyframes beat {
        0%,
        100% {
          transform: rotate(45deg) scale(1);
        }
        50% {
          transform: rotate(45deg) scale(1.08);
        }
      }

      .dot {
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: radial-gradient(
          circle at 35% 35%,
          #ffe5f2 0%,
          #ff9acb 35%,
          #ff78ba 100%
        );
        box-shadow: 0 0 0 8px rgba(255, 124, 186, 0.08),
          0 0 24px rgba(255, 123, 184, 0.32);
        animation: pulse 1.8s var(--ease-soft) infinite;
        pointer-events: auto;
        cursor: pointer;
        will-change: transform, opacity;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.16);
        }
      }

      .particles {
        position: fixed;
        inset: 0;
        pointer-events: none;
        overflow: hidden;
      }

      .particle {
        position: absolute;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: linear-gradient(180deg, #ffd7ea, #ff87c8);
        box-shadow: 0 0 10px rgba(255, 143, 196, 0.45);
        will-change: transform, opacity;
      }

      .spark {
        position: absolute;
        width: 3px;
        height: 14px;
        border-radius: 999px;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.95),
          rgba(255, 124, 186, 0.95)
        );
        box-shadow: 0 0 10px rgba(255, 143, 196, 0.46);
        will-change: transform, opacity;
      }

      .envelope-stage {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: auto;
      }

      .envelope-shell {
        position: relative;
        width: min(80vw, 430px);
        height: min(50vw, 270px);
        max-height: 270px;
        transform: translateY(8px);
        filter: drop-shadow(0 22px 34px rgba(0, 0, 0, 0.28));
        will-change: transform, opacity;
        perspective: 1200px;
      }

      .envelope-back {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(
            120px 80px at 30% 28%,
            rgba(255, 255, 255, 0.2),
            transparent 70%
          ),
          radial-gradient(
            220px 140px at 65% 72%,
            rgba(0, 0, 0, 0.08),
            transparent 72%
          ),
          linear-gradient(180deg, #f6dab3 0%, #dfb98d 100%);
        border-radius: 28px;
        overflow: hidden;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.38),
          inset 0 -20px 24px rgba(145, 87, 30, 0.08),
          inset 18px 0 30px rgba(255, 255, 255, 0.07),
          inset -18px 0 30px rgba(88, 49, 18, 0.06);
        z-index: 1;
      }

      .envelope-back::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            135deg,
            transparent 46.8%,
            rgba(143, 91, 38, 0.18) 47.8%,
            rgba(143, 91, 38, 0.1) 50%,
            transparent 51%
          ),
          linear-gradient(
            225deg,
            transparent 46.8%,
            rgba(143, 91, 38, 0.18) 47.8%,
            rgba(143, 91, 38, 0.1) 50%,
            transparent 51%
          );
        opacity: 0.9;
        pointer-events: none;
      }

      .envelope-back::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.22),
            rgba(255, 255, 255, 0.04) 18%,
            transparent 38%
          ),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.02) 0px,
            rgba(255, 255, 255, 0.02) 2px,
            transparent 2px,
            transparent 12px
          );
        opacity: 0.42;
        mix-blend-mode: soft-light;
        pointer-events: none;
      }

      .envelope-front {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        height: 70%;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.1), transparent 14%),
          linear-gradient(180deg, #e9c392 0%, #dca974 100%);
        clip-path: polygon(0 0, 50% 58%, 100% 0, 100% 100%, 0 100%);
        border-radius: 0 0 26px 26px;
        opacity: 0.98;
        pointer-events: none;
        z-index: 3;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.18),
          inset 0 -10px 22px rgba(122, 77, 31, 0.08);
      }

      .envelope-front::before {
        content: "";
        position: absolute;
        left: 50%;
        top: 0;
        width: 72%;
        height: 46%;
        transform: translateX(-50%);
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.1), transparent);
        clip-path: polygon(0 0, 50% 100%, 100% 0);
        opacity: 0.55;
      }

      .envelope-front::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            180deg,
            transparent 0%,
            transparent 34%,
            rgba(132, 82, 31, 0.15) 35%,
            rgba(255, 255, 255, 0.04) 36%,
            transparent 37%
          ),
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.06) 0%,
            transparent 12%,
            transparent 88%,
            rgba(0, 0, 0, 0.05) 100%
          );
        pointer-events: none;
        opacity: 0.95;
      }

      .envelope-flap {
        position: absolute;
        inset: 0;
        clip-path: polygon(0 0, 50% 48%, 100% 0, 100% 16%, 50% 66%, 0 16%);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.2), transparent 28%),
          linear-gradient(180deg, #eac69b 0%, #c79663 100%);
        transform-origin: 50% 0%;
        transform: rotateX(0deg) translateY(0);
        transition: transform 0.95s var(--ease-soft),
          filter 0.95s var(--ease-soft), opacity 0.35s ease;
        z-index: 4;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.36),
          inset 0 -12px 20px rgba(87, 54, 22, 0.1);
        cursor: pointer;
        backface-visibility: hidden;
        transform-style: preserve-3d;
      }

      .envelope-flap::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.2), transparent 20%),
          radial-gradient(
            220px 80px at 50% 22%,
            rgba(255, 255, 255, 0.14),
            transparent 66%
          );
        opacity: 0.95;
        pointer-events: none;
      }

      .envelope-flap::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            135deg,
            transparent 46%,
            rgba(128, 79, 31, 0.2) 47.5%,
            transparent 49.5%
          ),
          linear-gradient(
            225deg,
            transparent 46%,
            rgba(128, 79, 31, 0.18) 47.5%,
            transparent 49.5%
          );
        opacity: 0.9;
      }

      .envelope-flap.open {
        transform: rotateX(-180deg) translateY(-2px);
        filter: brightness(0.98);
        cursor: default;
      }

      .envelope-seal {
        position: absolute;
        left: 50%;
        top: 46%;
        width: 36px;
        height: 36px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        background: radial-gradient(
          circle at 35% 35%,
          #ffd9ea 0%,
          #ff8bc9 38%,
          #eb5c9f 100%
        );
        box-shadow: 0 0 0 6px rgba(255, 138, 203, 0.08),
          0 10px 22px rgba(0, 0, 0, 0.14);
        z-index: 5;
        transition: opacity 0.3s ease, transform 0.8s var(--ease-soft);
      }

      .envelope-seal.gone {
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.25);
      }

      .paper {
        position: absolute;
        left: 7%;
        width: 86%;
        height: 68%;
        bottom: 10%;
        border-radius: 18px;
        background:
          linear-gradient(
            180deg,
            rgba(255, 255, 255, 0.28),
            rgba(255, 255, 255, 0.06)
          ),
          linear-gradient(180deg, #f8ead0 0%, #efd7b3 100%);
        border: 1px solid rgba(92, 59, 24, 0.09);
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.4),
          0 14px 24px rgba(0, 0, 0, 0.09);
        transform: translateY(24%) translateZ(0);
        z-index: 2;
        touch-action: none;
        pointer-events: auto;
        will-change: transform, opacity;
        overflow: hidden;
      }

      .paper::before {
        content: "";
        position: absolute;
        inset: 0;
        background: radial-gradient(
          800px 220px at 50% 0%,
          rgba(255, 255, 255, 0.34),
          transparent 58%
        );
        pointer-events: none;
      }

      .paper::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.06) 0,
            rgba(255, 255, 255, 0) 18%,
            rgba(255, 255, 255, 0.03) 38%,
            rgba(255, 255, 255, 0) 62%,
            rgba(255, 255, 255, 0.05) 100%
          ),
          repeating-linear-gradient(
            180deg,
            rgba(111, 74, 30, 0.018) 0px,
            rgba(111, 74, 30, 0.018) 1px,
            transparent 1px,
            transparent 8px
          );
        opacity: 0.45;
        pointer-events: none;
      }

      .paper-handle {
        position: absolute;
        left: 50%;
        top: 10px;
        transform: translateX(-50%);
        width: 56px;
        height: 6px;
        border-radius: 999px;
        background: rgba(73, 46, 25, 0.16);
        opacity: 0.72;
      }

      .paper-content {
        position: absolute;
        inset: 16px 16px 14px;
        overflow: hidden;
        color: var(--ink);
        user-select: none;
        text-shadow: 0 1px 0 rgba(255, 255, 255, 0.25);
        white-space: pre-line;
        display: grid;
        place-items: center;
        padding: 4px;
      }

      .paper-qr {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        border-radius: 12px;
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.08);
        user-select: none;
        -webkit-user-drag: none;
      }

      .paper-grip {
        position: absolute;
        right: 14px;
        top: 14px;
        color: rgba(47, 33, 24, 0.4);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.02em;
        opacity: 0;
        transition: opacity 0.45s ease;
      }

      .paper-ready .paper-grip {
        opacity: 1;
      }

      .soft-glow {
        position: absolute;
        inset: -24px;
        border-radius: 42px;
        background: radial-gradient(
          circle at 50% 50%,
          rgba(255, 148, 206, 0.13),
          transparent 55%
        );
        filter: blur(18px);
        pointer-events: none;
      }

      .music-btn {
        position: fixed;
        right: 16px;
        bottom: 16px;
        z-index: 20;
        pointer-events: auto;
        appearance: none;
        border: 0;
        padding: 12px 16px;
        border-radius: 999px;
        color: rgba(255, 255, 255, 0.94);
        background: rgba(16, 16, 20, 0.42);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.22);
        font: 600 14px/1 Inter, -apple-system, BlinkMacSystemFont, "San Francisco",
          system-ui, sans-serif;
        letter-spacing: 0.01em;
        cursor: pointer;
      }

      .music-btn:active {
        transform: scale(0.98);
      }

      .tiny-note {
        position: fixed;
        left: 16px;
        bottom: 18px;
        z-index: 20;
        color: rgba(255, 255, 255, 0.56);
        font: 500 12px/1.4 Inter, -apple-system, BlinkMacSystemFont, "San Francisco",
          system-ui, sans-serif;
        pointer-events: none;
      }

      .floating-paper {
        position: fixed !important;
        left: 0;
        top: 0;
        margin: 0 !important;
        z-index: 1000;
        pointer-events: none;
        will-change: left, top, transform, opacity;
      }

      .floating-paper .paper-content {
        inset: 16px 16px 14px;
      }

      .floating-paper .paper-grip {
        opacity: 0 !important;
      }
    </style>
  </head>

  <body>
    <canvas id="bg"></canvas>
    <div class="particles" id="particles"></div>

    <div class="stage">
      <div class="center-stack" id="centerStack">
        <div class="soft-glow"></div>
        <div class="text-wrap" id="textWrap"></div>
        <div
          class="envelope-stage"
          id="envelopeStage"
          style="
            opacity: 0;
            transform: translateY(14px);
            transition: opacity 0.8s var(--ease-soft),
              transform 0.8s var(--ease-soft);
          "
        ></div>
      </div>
    </div>

    <button class="music-btn" id="musicBtn">Включить музыку</button>
    <div class="tiny-note">
      🎵 M. — Anıl Emre Daldal
    </div>

    <audio id="music" loop preload="auto">
      <source src="music.mp3" type="audio/mpeg" />
    </audio>

    <script>
      const prefersReducedMotion =
        window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      const canvas = document.getElementById("bg");
      const ctx = canvas.getContext("2d");
      const particles = document.getElementById("particles");
      const textWrap = document.getElementById("textWrap");
      const envelopeStage = document.getElementById("envelopeStage");
      const music = document.getElementById("music");
      const musicBtn = document.getElementById("musicBtn");

      let W = 0,
        H = 0,
        dpr = 1;

      const streaks = [];
      const stars = [];

      function resize() {
        dpr = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = Math.floor(W * dpr);
        canvas.height = Math.floor(H * dpr);
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        if (!stars.length) {
          for (let i = 0; i < 120; i++) {
            stars.push({
              x: Math.random() * W,
              y: Math.random() * H,
              r: Math.random() * 1.25 + 0.2,
              a: Math.random() * 0.55 + 0.15,
              tw: Math.random() * 0.02 + 0.005,
            });
          }
        }
      }

      window.addEventListener("resize", resize, { passive: true });
      resize();

      function spawnStreak() {
        if (streaks.length > 70) return;
        streaks.push({
          x: Math.random() * W,
          y: -40 - Math.random() * H * 0.2,
          vx: -0.25 - Math.random() * 0.12,
          vy: 3.8 + Math.random() * 3.4,
          len: 30 + Math.random() * 40,
          w: 1 + Math.random() * 1.8,
          life: 1,
          decay: 0.008 + Math.random() * 0.008,
        });
      }

      function drawBackground() {
        ctx.clearRect(0, 0, W, H);
        ctx.fillStyle = "rgba(2, 2, 4, 0.16)";
        ctx.fillRect(0, 0, W, H);

        const grad = ctx.createRadialGradient(
          W * 0.5,
          H * 0.38,
          20,
          W * 0.5,
          H * 0.38,
          Math.max(W, H) * 0.6
        );
        grad.addColorStop(0, "rgba(255, 134, 196, 0.06)");
        grad.addColorStop(0.55, "rgba(255, 86, 170, 0.025)");
        grad.addColorStop(1, "rgba(255, 86, 170, 0)");
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);

        for (const s of stars) {
          s.x += 0.01;
          s.a += Math.sin(Date.now() * s.tw + s.x) * 0.002;
          if (s.x > W + 4) s.x = -4;
          ctx.beginPath();
          ctx.fillStyle = `rgba(255, 206, 230, ${Math.max(
            0.12,
            Math.min(0.75, s.a)
          )})`;
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.fill();
        }

        if (!prefersReducedMotion) {
          if (Math.random() < 0.18) spawnStreak();
        }

        for (let i = streaks.length - 1; i >= 0; i--) {
          const st = streaks[i];
          st.x += st.vx;
          st.y += st.vy;
          st.life -= st.decay;
          const alpha = Math.max(0, st.life);

          const x2 = st.x - st.vx * st.len;
          const y2 = st.y - st.vy * st.len;
          const g = ctx.createLinearGradient(st.x, st.y, x2, y2);
          g.addColorStop(0, `rgba(255, 194, 227, ${0.85 * alpha})`);
          g.addColorStop(1, "rgba(255, 124, 186, 0)");

          ctx.strokeStyle = g;
          ctx.lineWidth = st.w;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(st.x, st.y);
          ctx.lineTo(x2, y2);
          ctx.stroke();

          if (st.life <= 0 || st.y > H + 80 || st.x < -120) streaks.splice(i, 1);
        }

        requestAnimationFrame(drawBackground);
      }
      drawBackground();

      const scenes = [
        "1..",
        "2..",
        "3..",
        "поздравляю тебя, моя любовь,",
        "с 7 месяцами отношений",
      ];

      function delay(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      async function showTextSequence() {
        for (const line of scenes) {
          textWrap.innerHTML = "";
          const el = document.createElement("div");
          el.className = "word";
          el.textContent = line;
          textWrap.appendChild(el);
          requestAnimationFrame(() => el.classList.add("show"));
          await delay(line.includes("поздравляю") ? 2400 : 1400);
        }
        await delay(250);
        showHeart();
      }

      function makeParticleBurst(
        x,
        y,
        count,
        baseSpeed,
        sizeMin,
        sizeMax,
        spreadMs,
        type = "dot"
      ) {
        const frag = document.createDocumentFragment();
        const created = [];

        for (let i = 0; i < count; i++) {
          const node = document.createElement("div");
          node.className = type === "spark" ? "spark" : "particle";

          const angle = Math.random() * Math.PI * 2;
          const dist = 110 + Math.random() * 120;
          const dx = Math.cos(angle) * dist * (0.45 + Math.random() * 0.8);
          const dy = Math.sin(angle) * dist * (0.45 + Math.random() * 0.8);
          const size = sizeMin + Math.random() * (sizeMax - sizeMin);

          node.style.left = x + "px";
          node.style.top = y + "px";
          node.style.width = size + "px";
          node.style.height = (type === "spark" ? size * 2.8 : size) + "px";
          node.style.opacity = "1";
          node.style.transform =
            "translate(-50%, -50%) translate(0px, 0px) scale(1)";
          frag.appendChild(node);
          created.push({ node, dx, dy });
        }

        particles.appendChild(frag);

        created.forEach((p, idx) => {
          const arc = Math.random() * 22;
          const wobble = (Math.random() - 0.5) * 32;
          p.node.animate(
            [
              {
                transform: "translate(-50%, -50%) translate(0px, 0px) scale(1)",
                opacity: 1,
              },
              {
                transform: `translate(-50%, -50%) translate(${p.dx * 0.45}px, ${
                  p.dy * 0.45 - arc
                }px) scale(1.08)`,
                opacity: 1,
                offset: 0.18,
              },
              {
                transform: `translate(-50%, -50%) translate(${p.dx * 0.78 + wobble * 0.25}px, ${
                  p.dy * 0.78 + arc
                }px) scale(0.9)`,
                opacity: 0.96,
                offset: 0.44,
              },
              {
                transform: `translate(-50%, -50%) translate(${p.dx}px, ${p.dy}px) scale(0.15)`,
                opacity: 0,
              },
            ],
            {
              duration: spreadMs + Math.random() * 380,
              easing: "cubic-bezier(0.12, 0.82, 0.18, 1)",
              delay: idx * 2,
              fill: "forwards",
            }
          );
          setTimeout(() => p.node.remove(), spreadMs + 540);
        });
      }

      function makeSwirlToCenter(originX, originY, onDone) {
        const count = 34;
        for (let i = 0; i < count; i++) {
          const node = document.createElement("div");
          node.className = "particle";
          const startX = originX + (Math.random() - 0.5) * 38;
          const startY = originY + (Math.random() - 0.5) * 38;
          const endX = window.innerWidth / 2 + (Math.random() - 0.5) * 12;
          const endY = window.innerHeight / 2 + (Math.random() - 0.5) * 12;
          const controlX = (startX + endX) / 2 + (Math.random() - 0.5) * 180;
          const controlY = (startY + endY) / 2 + (Math.random() - 0.5) * 180;

          node.style.left = startX + "px";
          node.style.top = startY + "px";
          particles.appendChild(node);

          const duration = 1100 + Math.random() * 250;
          const keyframes = [
            { transform: "translate(-50%, -50%) scale(1)", opacity: 1 },
            {
              transform: `translate(calc(-50% + ${controlX - startX}px), calc(-50% + ${controlY - startY}px)) scale(1.03)`,
              opacity: 0.95,
              offset: 0.58,
            },
            {
              transform: `translate(calc(-50% + ${endX - startX}px), calc(-50% + ${endY - startY}px)) scale(0.7)`,
              opacity: 0.8,
            },
            {
              transform: `translate(calc(-50% + ${endX - startX}px), calc(-50% + ${endY - startY}px)) scale(0.18)`,
              opacity: 0,
            },
          ];
          node.animate(keyframes, {
            duration,
            easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
            fill: "forwards",
            delay: i * 3,
          });
          setTimeout(() => node.remove(), duration + 380);
        }
        setTimeout(onDone, 1300);
      }

      function makeHeartFireworkBurst(x, y) {
        makeParticleBurst(x, y, 64, 12, 4, 10, 1460, "spark");
        setTimeout(() => makeParticleBurst(x, y, 28, 10, 5, 12, 1120, "dot"), 80);
        setTimeout(() => makeParticleBurst(x, y, 18, 13, 3, 7, 1280, "spark"), 170);
        setTimeout(() => makeParticleBurst(x, y, 12, 11, 4, 8, 1100, "dot"), 260);
      }

      function showHeart() {
        textWrap.innerHTML = "";

        const holder = document.createElement("div");
        holder.style.display = "grid";
        holder.style.placeItems = "center";
        holder.style.gap = "12px";
        holder.style.pointerEvents = "auto";
        holder.style.position = "relative";
        holder.style.zIndex = "10";

        const shell = document.createElement("div");
        shell.className = "heart-shell";
        shell.setAttribute("role", "button");
        shell.setAttribute("tabindex", "0");
        shell.setAttribute("aria-label", "Открыть сердце");
        shell.innerHTML = '<div class="heart"></div>';

        const trigger = () => {
          if (shell.dataset.used === "1") return;
          shell.dataset.used = "1";
          burstHeart(shell);
        };

        shell.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          e.stopPropagation();
          trigger();
        });

        shell.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          trigger();
        });

        shell.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") {
            e.preventDefault();
            trigger();
          }
        });

        holder.appendChild(shell);
        textWrap.appendChild(holder);
      }

      function burstHeart(shell) {
        const rect = shell.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;

        const heart = shell.querySelector(".heart");

        shell.animate(
          [
            { transform: "scale(1) rotate(0deg)", opacity: 1 },
            {
              transform: "scale(1.05) rotate(-2deg)",
              opacity: 1,
              offset: 0.16,
            },
            {
              transform: "scale(1.12) rotate(2deg)",
              opacity: 1,
              offset: 0.38,
            },
            {
              transform: "scale(0.78) rotate(7deg)",
              opacity: 0.72,
              offset: 0.74,
            },
            { transform: "scale(0.12) rotate(12deg)", opacity: 0 },
          ],
          {
            duration: 860,
            easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
            fill: "forwards",
          }
        );

        heart.animate(
          [
            { transform: "rotate(45deg) scale(1)", opacity: 1 },
            {
              transform: "rotate(45deg) scale(1.12)",
              opacity: 1,
              offset: 0.22,
            },
            {
              transform: "rotate(45deg) scale(1.28)",
              opacity: 0.96,
              offset: 0.45,
            },
            {
              transform: "rotate(45deg) scale(0.88)",
              opacity: 0.45,
              offset: 0.66,
            },
            { transform: "rotate(45deg) scale(0.12)", opacity: 0 },
          ],
          {
            duration: 860,
            easing: "cubic-bezier(0.14, 0.82, 0.22, 1)",
            fill: "forwards",
          }
        );

        const glow = document.createElement("div");
        glow.style.position = "fixed";
        glow.style.left = x + "px";
        glow.style.top = y + "px";
        glow.style.width = "14px";
        glow.style.height = "14px";
        glow.style.borderRadius = "50%";
        glow.style.transform = "translate(-50%, -50%) scale(1)";
        glow.style.pointerEvents = "none";
        glow.style.zIndex = "999";
        glow.style.background =
          "radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255, 154, 203, 0.55) 30%, rgba(255, 122, 183, 0.05) 72%, rgba(255, 122, 183, 0) 100%)";
        document.body.appendChild(glow);

        glow.animate(
          [
            { transform: "translate(-50%, -50%) scale(1)", opacity: 0.95 },
            {
              transform: "translate(-50%, -50%) scale(9)",
              opacity: 0.55,
              offset: 0.4,
            },
            {
              transform: "translate(-50%, -50%) scale(18)",
              opacity: 0,
            },
          ],
          {
            duration: 700,
            easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
            fill: "forwards",
          }
        );
        setTimeout(() => glow.remove(), 760);

        setTimeout(() => {
          makeHeartFireworkBurst(x, y);
        }, 130);

        setTimeout(() => {
          makeSwirlToCenter(x, y, () => {
            showDot();
          });
        }, 340);
      }

      function showDot() {
        textWrap.innerHTML = "";

        const wrap = document.createElement("div");
        wrap.style.position = "relative";
        wrap.style.display = "grid";
        wrap.style.placeItems = "center";
        wrap.style.pointerEvents = "auto";
        wrap.style.zIndex = "10";

        const dot = document.createElement("div");
        dot.className = "dot";
        dot.style.opacity = "0";
        dot.style.transform = "scale(0.35)";

        wrap.appendChild(dot);
        textWrap.appendChild(wrap);

        requestAnimationFrame(() => {
          dot.animate(
            [
              { transform: "scale(0.35)", opacity: 0 },
              { transform: "scale(1.08)", opacity: 1, offset: 0.55 },
              { transform: "scale(1)", opacity: 1 },
            ],
            {
              duration: 520,
              easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
              fill: "forwards",
            }
          );
          dot.style.opacity = "1";
          dot.style.transform = "scale(1)";
        });

        dot.addEventListener(
          "pointerdown",
          (e) => {
            e.stopPropagation();
            explodeDot(dot);
          },
          { once: true }
        );
      }

      function explodeDot(dot) {
        const rect = dot.getBoundingClientRect();
        const x = rect.left + rect.width / 2;
        const y = rect.top + rect.height / 2;

        dot.animate(
          [
            { transform: "scale(1)", opacity: 1 },
            { transform: "scale(1.12)", opacity: 1, offset: 0.2 },
            { transform: "scale(0.55)", opacity: 0.95, offset: 0.5 },
            { transform: "scale(0.1)", opacity: 0 },
          ],
          {
            duration: 520,
            easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
            fill: "forwards",
          }
        );

        makeParticleBurst(x, y, 66, 9.5, 3, 7, 1050, "spark");
        setTimeout(() => showEnvelope(x, y), 120);
      }

      function showEnvelope(originX, originY) {
        textWrap.innerHTML = "";
        envelopeStage.innerHTML = `
          <div class="envelope-shell" id="envelopeShell">
            <div class="envelope-back"></div>
            <div class="paper" id="paper">
              <div class="paper-handle"></div>
              <div class="paper-grip">тянуть вверх</div>
              <div class="paper-content" id="paperContent">
                <img class="paper-qr" src="lolqr.png" alt="lolqr.png" />
              </div>
            </div>
            <div class="envelope-front"></div>
            <div class="envelope-flap" id="flap"></div>
            <div class="envelope-seal" id="seal"></div>
          </div>
        `;

        envelopeStage.style.opacity = "0";
        envelopeStage.style.transform = "translateY(0) scale(1)";
        envelopeStage.style.pointerEvents = "auto";
        envelopeStage.style.position = "fixed";
        envelopeStage.style.left = "0";
        envelopeStage.style.top = "0";
        envelopeStage.style.width = "100vw";
        envelopeStage.style.height = "100vh";

        const shell = document.getElementById("envelopeShell");
        const flap = document.getElementById("flap");
        const seal = document.getElementById("seal");
        const paper = document.getElementById("paper");
        const paperContent = document.getElementById("paperContent");

        paperContent.style.whiteSpace = "pre-line";

        let opened = false;
        let extracting = false;
        let finished = false;
        let dragStartY = 0;
        let dragStartTranslate = 24;
        let currentTranslate = 24;
        let autoPullTimer = null;
        let draggingPointerId = null;

        function setPaperTranslate(percent) {
          currentTranslate = Math.max(-96, Math.min(30, percent));
          paper.style.transform = `translateY(${currentTranslate}%) translateZ(0)`;
        }

        paper.style.transform = "translateY(24%) translateZ(0)";

        shell.style.position = "absolute";
        shell.style.left = originX + "px";
        shell.style.top = originY + "px";
        shell.style.transform = "translate(-50%, -50%) scale(0.25)";
        shell.style.opacity = "0";

        requestAnimationFrame(() => {
          envelopeStage.style.opacity = "1";
          shell.animate(
            [
              { transform: "translate(-50%, -50%) scale(0.25)", opacity: 0 },
              { transform: "translate(-50%, -50%) scale(1.06)", opacity: 1, offset: 0.6 },
              { transform: "translate(-50%, -50%) scale(1)", opacity: 1 },
            ],
            {
              duration: 620,
              easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
              fill: "forwards",
            }
          );
        });

        const openEnvelope = () => {
          if (opened) return;
          opened = true;
          flap.classList.add("open");
          seal.classList.add("gone");
          shell.classList.add("paper-ready");
          setPaperTranslate(18);

          paper.animate(
            [
              { transform: "translateY(24%) scale(1)" },
              { transform: "translateY(18%) scale(1.008)" },
            ],
            {
              duration: 680,
              easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
              fill: "forwards",
            }
          );
        };

        const burstEnvelope = () => {
          if (finished) return;
          finished = true;

          const rect = shell.getBoundingClientRect();
          const cx = rect.left + rect.width / 2;
          const cy = rect.top + rect.height / 2;

          makeParticleBurst(cx, cy, 84, 8.5, 3, 8, 1120, "spark");
          makeParticleBurst(cx, cy, 30, 7, 5, 10, 900, "dot");

          shell.animate(
            [
              { transform: "translate(-50%, -50%) scale(1)", opacity: 1 },
              {
                transform: "translate(-50%, -50%) scale(0.96) rotate(-1deg)",
                opacity: 0.88,
                offset: 0.25,
              },
              {
                transform: "translate(-50%, -50%) scale(0.56) rotate(6deg)",
                opacity: 0,
              },
            ],
            {
              duration: 680,
              easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
              fill: "forwards",
            }
          );

          envelopeStage.animate(
            [
              { opacity: 1, transform: "translateY(0) scale(1)" },
              { opacity: 0.5, transform: "translateY(0) scale(0.985)" },
              { opacity: 0, transform: "translateY(14px) scale(0.96)" },
            ],
            {
              duration: 720,
              easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
              fill: "forwards",
            }
          );

          setTimeout(() => {
            envelopeStage.innerHTML = "";
          }, 900);
        };

        const movePaperToCenter = () => {
          const rect = paper.getBoundingClientRect();
          const floating = paper.cloneNode(true);
          floating.classList.add("floating-paper");
          floating.id = "floatingPaper";
          floating.style.left = rect.left + "px";
          floating.style.top = rect.top + "px";
          floating.style.width = rect.width + "px";
          floating.style.height = rect.height + "px";
          floating.style.transform = "translate(0px, 0px) scale(1)";
          floating.style.opacity = "1";
          floating.style.pointerEvents = "none";

          document.body.appendChild(floating);

          const centerLeft = Math.round(window.innerWidth / 2 - rect.width / 2);
          const centerTop = Math.round(window.innerHeight / 2 - rect.height / 2);

          floating.animate(
            [
              {
                left: rect.left + "px",
                top: rect.top + "px",
                transform: "translateY(0px) scale(1)",
                opacity: 0.98,
              },
              {
                left: rect.left + "px",
                top: rect.top - 28 + "px",
                transform: "translateY(-8px) scale(1.012)",
                opacity: 1,
                offset: 0.2,
              },
              {
                left: centerLeft + "px",
                top: centerTop + "px",
                transform: "translateY(0px) scale(1.03)",
                opacity: 1,
              },
            ],
            {
              duration: 1020,
              easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
              fill: "forwards",
            }
          );

          setTimeout(() => {
            floating.style.left = centerLeft + "px";
            floating.style.top = centerTop + "px";
            floating.style.transform = "translateY(0px) scale(1.03)";
          }, 1020);
        };

        const triggerExtraction = () => {
          if (extracting || finished) return;
          extracting = true;
          clearTimeout(autoPullTimer);

          openEnvelope();

          const startLift = paper.animate(
            [
              { transform: `translateY(${currentTranslate}%) scale(1)` },
              {
                transform: `translateY(${Math.max(currentTranslate - 8, 10)}%) scale(1.01)`,
              },
            ],
            {
              duration: 180,
              easing: "cubic-bezier(0.18, 0.88, 0.22, 1)",
              fill: "forwards",
            }
          );

          startLift.onfinish = () => {
            const current = currentTranslate;
            const exitAnim = paper.animate(
              [
                { transform: `translateY(${current}%) scale(1.01)` },
                { transform: "translateY(6%) scale(1.02)", offset: 0.12 },
                { transform: "translateY(-22%) scale(1.02)", offset: 0.28 },
                { transform: "translateY(-62%) scale(1.01)", offset: 0.62 },
                { transform: "translateY(-110%) scale(1)" },
              ],
              {
                duration: 900,
                easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
                fill: "forwards",
              }
            );

            exitAnim.onfinish = () => {
              movePaperToCenter();
              paper.style.opacity = "0";
              flap.classList.remove("open");
              seal.classList.add("gone");

              shell.animate(
                [
                  { filter: "drop-shadow(0 22px 34px rgba(0,0,0,0.28))", opacity: 1 },
                  { filter: "drop-shadow(0 14px 20px rgba(0,0,0,0.22))", opacity: 1, offset: 0.2 },
                  { filter: "drop-shadow(0 8px 14px rgba(0,0,0,0.12))", opacity: 0.9, offset: 0.45 },
                  { filter: "drop-shadow(0 0 0 rgba(0,0,0,0))", opacity: 0 },
                ],
                {
                  duration: 760,
                  easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
                  fill: "forwards",
                }
              );

              setTimeout(() => {
                burstEnvelope();
              }, 160);
            };
          };
        };

        const paperPointerDown = (e) => {
          e.stopPropagation();
          if (finished || extracting) return;
          if (!opened) openEnvelope();

          extracting = true;
          draggingPointerId = e.pointerId;
          dragStartY = e.clientY;
          dragStartTranslate = currentTranslate;

          paper.setPointerCapture?.(e.pointerId);

          autoPullTimer = setTimeout(() => {
            triggerExtraction();
          }, 180);

          paper.animate(
            [
              { transform: `translateY(${currentTranslate}%) scale(1)` },
              {
                transform: `translateY(${Math.max(currentTranslate - 2, 12)}%) scale(1.008)`,
              },
            ],
            {
              duration: 120,
              easing: "ease-out",
              fill: "forwards",
            }
          );
        };

        const paperPointerMove = (e) => {
          if (!extracting || finished) return;
          if (draggingPointerId !== null && e.pointerId !== draggingPointerId) return;

          e.preventDefault();

          const deltaPx = dragStartY - e.clientY;
          const next = Math.max(-12, Math.min(28, dragStartTranslate - deltaPx / 4.8));
          setPaperTranslate(next);

          if (deltaPx > 38) {
            clearTimeout(autoPullTimer);
            triggerExtraction();
          }
        };

        const paperPointerUp = (e) => {
          if (finished) return;
          if (draggingPointerId !== null && e.pointerId !== draggingPointerId) return;

          clearTimeout(autoPullTimer);
          draggingPointerId = null;

          if (extracting && currentTranslate <= 14) {
            triggerExtraction();
          } else if (extracting && !finished) {
            paper.animate(
              [
                { transform: `translateY(${currentTranslate}%) scale(1)` },
                {
                  transform: `translateY(${Math.min(currentTranslate + 6, 18)}%) scale(1)`,
                },
              ],
              {
                duration: 360,
                easing: "cubic-bezier(0.2, 0.8, 0.2, 1)",
                fill: "forwards",
              }
            );
            setPaperTranslate(Math.min(currentTranslate + 6, 18));
            extracting = false;
          }
        };

        paper.addEventListener("pointerdown", paperPointerDown);
        paper.addEventListener("pointermove", paperPointerMove);
        paper.addEventListener("pointerup", paperPointerUp);
        paper.addEventListener("pointercancel", paperPointerUp);
        paper.addEventListener("pointerleave", paperPointerUp);

        flap.addEventListener("pointerdown", (e) => {
          e.stopPropagation();
          openEnvelope();
        });

        shell.addEventListener("pointerdown", (e) => {
          if (finished) return;
          if (e.target === paper || paper.contains(e.target)) return;
          openEnvelope();
        });

        paper.addEventListener("click", (e) => {
          e.stopPropagation();
          if (finished) return;
          triggerExtraction();
        });

        envelopeStage.animate(
          [
            { opacity: 0, transform: "translateY(14px) scale(0.99)" },
            { opacity: 1, transform: "translateY(0) scale(1)" },
          ],
          {
            duration: 780,
            easing: "cubic-bezier(0.16, 0.84, 0.22, 1)",
            fill: "forwards",
          }
        );
      }

      requestAnimationFrame(showTextSequence);

      async function tryPlayMusic() {
        try {
          await music.play();
          musicBtn.textContent = "Музыка играет";
          setTimeout(() => {
            musicBtn.style.opacity = "0.18";
          }, 1200);
        } catch (_) {}
      }

      musicBtn.addEventListener("pointerdown", tryPlayMusic);
      document.addEventListener(
        "pointerdown",
        () => {
          if (music.paused) tryPlayMusic();
        },
        { once: true }
      );
    </script>
  </body>
</html>
