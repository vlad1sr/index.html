<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">

<title>❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#020204;
font-family:'Inter', -apple-system, system-ui;
overflow:hidden;
color:white;
}

/* ===== ФОН ===== */
canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* ===== ЦЕНТР ===== */
.center{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
flex-direction:column;
align-items:center;
gap:30px;
z-index:10;
}

/* ===== ТЕКСТ ===== */
.word{
font-size:clamp(28px,5vw,48px);
font-weight:800;
opacity:0;
transform:translateY(20px);
transition:0.6s;
}

.word.show{
opacity:1;
transform:translateY(0);
}

/* ===== СЕРДЦЕ ===== */
.heart{
width:110px;
height:110px;
background:linear-gradient(135deg,#ff6b9d,#ff85a8);
transform:rotate(45deg);
border-radius:24px;
position:relative;
cursor:pointer;
animation:pulse 1.4s infinite;
}

.heart:before,
.heart:after{
content:'';
position:absolute;
width:110px;
height:110px;
background:inherit;
border-radius:50%;
}

.heart:before{top:-55px;}
.heart:after{left:-55px;}

@keyframes pulse{
0%,100%{transform:rotate(45deg) scale(1);}
50%{transform:rotate(45deg) scale(1.1);}
}

/* ===== КОНВЕРТ ===== */
.envelope{
position:relative;
width:320px;
height:220px;
perspective:1200px;
}

.env-back{
position:absolute;
width:100%;
height:100%;
background:linear-gradient(145deg,#e6d3b3,#c89f6a);
border-radius:12px;
z-index:1;
}

.env-inside{
position:absolute;
width:100%;
height:100%;
overflow:hidden;
z-index:2;
}

.env-flap{
position:absolute;
width:100%;
height:55%;
background:linear-gradient(#f3e2c7,#e6d3b3);
transform-origin:top;
transition:0.5s;
z-index:3;
}

.env-flap.open{
transform:rotateX(150deg);
}

/* ===== ПИСЬМО ===== */
.letter{
position:absolute;
bottom:-60%;
left:50%;
transform:translateX(-50%);
width:90%;
height:80%;
background:#fffdf5;
border-radius:12px;
padding:20px;
color:#444;
transition:transform 0.5s cubic-bezier(.34,1.56,.64,1);
box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

.letter h2{
font-weight:700;
margin-bottom:10px;
}

.letter p{
font-weight:500;
line-height:1.5;
}

/* ===== ВЗРЫВ ===== */
.particle{
position:fixed;
width:10px;
height:10px;
border-radius:3px;
pointer-events:none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="center" id="app"></div>

<script>
const app = document.getElementById('app');

/* ========= ФОН (как ты хотел) ========= */
const canvas = document.getElementById('bg');
const ctx = canvas.getContext('2d');

let W,H;
let stars=[];

function resize(){
W=canvas.width=innerWidth;
H=canvas.height=innerHeight;

stars=[];
for(let i=0;i<120;i++){
stars.push({
x:Math.random()*W,
y:Math.random()*H,
r:Math.random()*1.2,
a:Math.random()*0.6
});
}
}
resize();
addEventListener('resize',resize);

function draw(){
ctx.fillStyle='rgba(0,0,0,0.2)';
ctx.fillRect(0,0,W,H);

for(let s of stars){
ctx.beginPath();
ctx.fillStyle=`rgba(255,200,230,${s.a})`;
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
}

requestAnimationFrame(draw);
}
draw();

/* ========= СЦЕНЫ ========= */
const scenes = ['1..','2..','3..','моя любовь ❤️'];

function delay(ms){return new Promise(r=>setTimeout(r,ms));}

async function start(){
for(let s of scenes){
app.innerHTML = `<div class="word">${s}</div>`;
await delay(50);
app.firstChild.classList.add('show');
await delay(1200);
}

showHeart();
}

/* ========= СЕРДЦЕ ========= */
function showHeart(){
app.innerHTML = `<div class="heart"></div>`;
const heart = document.querySelector('.heart');

heart.onclick=()=>{
heart.style.opacity=0;
setTimeout(showEnvelope,400);
};
}

/* ========= КОНВЕРТ ========= */
function showEnvelope(){
app.innerHTML = `
<div class="envelope">
<div class="env-back"></div>
<div class="env-flap"></div>
<div class="env-inside">
<div class="letter">
<h2>Моя любовь,</h2>
<p>Семь месяцев с тобой — лучшее, что было со мной.</p>
<p>Ты — моё всё ❤️</p>
</div>
</div>
</div>
`;

const flap = document.querySelector('.env-flap');
const letter = document.querySelector('.letter');

let startY=0;
let dragging=false;
let extracted=false;

flap.onmousedown = e=>{
startY=e.clientY;
dragging=true;
};

document.onmousemove = e=>{
if(!dragging || extracted) return;

let d=(startY-e.clientY)/2;
let r=Math.min(150,Math.max(0,d));

flap.style.transform=`rotateX(${r}deg)`;

if(r>100) flap.classList.add('open');
};

document.onmouseup=()=>dragging=false;

/* письмо */
letter.onmousedown=e=>{
if(!flap.classList.contains('open')) return;
startY=e.clientY;
dragging=true;
};

document.addEventListener('mousemove', e=>{
if(!dragging || extracted) return;

let d=startY-e.clientY;
let y=Math.min(0,d);

letter.style.transform=`translateX(-50%) translateY(${y}px)`;

if(Math.abs(y)>160 && !extracted){
extracted=true;
explode();

letter.style.transform='translateX(-50%) translateY(-240px) scale(1.05)';
letter.style.zIndex=20;
}
});

/* взрыв */
function explode(){
for(let i=0;i<25;i++){
let el=document.createElement('div');
el.className='particle';
el.style.background=`hsl(${Math.random()*30+20},70%,60%)`;

document.body.appendChild(el);

let x=innerWidth/2;
let y=innerHeight/2;

let vx=(Math.random()-0.5)*10;
let vy=(Math.random()-0.5)*10;

let life=60;

function anim(){
if(life--<=0){el.remove();return;}

vy+=0.3;
x+=vx;
y+=vy;

el.style.left=x+'px';
el.style.top=y+'px';

requestAnimationFrame(anim);
}
anim();
}
}
}

start();
</script>

</body>
</html>
